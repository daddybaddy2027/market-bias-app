name: Validate market intelligence app

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, feature/13-model-live-board]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Type-check model board core
        run: >-
          npx tsc --noEmit --strict --skipLibCheck --esModuleInterop
          --jsx react-jsx --moduleResolution bundler --module preserve
          --target es2022
          src/config/modelCatalog.ts
          src/config/access.ts
          src/services/modelHistory.ts
          src/services/marketBoardApi.ts
          src/screens/RestoredDashboardScreen.tsx
          src/screens/RestoredModelDetailScreen.tsx
          src/components/ModelProjectionChart.tsx

      - name: Expo web export
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://example.supabase.co
          EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder
          EXPO_PUBLIC_PAYPAL_CLIENT_ID: placeholder
          EXPO_PUBLIC_PAYPAL_PRO_MONTHLY_PLAN_ID: placeholder
          EXPO_PUBLIC_SUPPORT_URL: https://example.com
        run: npx expo export --platform web
